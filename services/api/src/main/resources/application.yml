spring:
  application:
    name: homehub-api
  profiles:
    default: standalone

server:
  port: ${PORT:8080}

---
spring:
  config:
    activate:
      on-profile: standalone
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${HOMEHUB_DB_URL:jdbc:postgresql://localhost:5432/homehub}
    username: ${HOMEHUB_DB_USERNAME:homehub}
    password: ${HOMEHUB_DB_PASSWORD:homehub}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
