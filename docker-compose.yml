name: homehub

services:
  postgres:
    image: postgres:17-alpine
    container_name: homehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${HOMEHUB_DB_NAME:-homehub}
      POSTGRES_USER: ${HOMEHUB_DB_USERNAME:-homehub}
      POSTGRES_PASSWORD: ${HOMEHUB_DB_PASSWORD:-homehub}
    ports:
      - "${HOMEHUB_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
